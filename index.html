<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Portfólio Pessoal Acadêmico</title>

		<!-- Vincula os estilos principais do projeto -->
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<!-- Cabeçalho principal com identificação e navegação -->
		<header>
			<h1>Meu Portfólio Acadêmico</h1>

			<!-- Menu de navegação com links âncora para as seções da página -->
			<nav aria-label="Navegação principal">
				<ul>
					<li><a href="#sobre">Sobre</a></li>
					<li><a href="#formacao">Formação</a></li>
					<li><a href="#portfolio">Portfólio</a></li>
					<li><a href="#contato">Contato</a></li>
				</ul>
			</nav>
		</header>

		<!-- Conteúdo principal da página -->
		<main>
			<!-- Seção com informações pessoais e resumo profissional/acadêmico -->
			<section id="sobre" aria-labelledby="titulo-sobre">
				<h2 id="titulo-sobre">Sobre</h2>
			</section>

			<!-- Seção com histórico de formação e cursos -->
			<section id="formacao" aria-labelledby="titulo-formacao">
				<h2 id="titulo-formacao">Formação</h2>
			</section>

			<!-- Seção destinada à exibição de projetos e trabalhos -->
			<section id="portfolio" aria-labelledby="titulo-portfolio">
				<h2 id="titulo-portfolio">Portfólio</h2>
			</section>

			<!-- Seção com informações e canais de contato -->
			<section id="contato" aria-labelledby="titulo-contato">
				<h2 id="titulo-contato">Contato</h2>
			</section>
		</main>

		<!-- Rodapé com informações complementares -->
		<footer>
			<p>&copy; 2026 - Portfólio Pessoal Acadêmico</p>
		</footer>

		<!-- Vincula o script JavaScript no final do body -->
		<script src="script.js"></script>
	</body>
</html>
